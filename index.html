<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강의장 안내 대시보드</title>
    <!-- Noto Sans KR 폰트 적용 (롯데 스타일과 유사) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --lotte-red: #E30613;
            --bg-gray: #f8f8f8;
            --text-dark: #222;
            --border-color: #eee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #333; /* 배경 어둡게 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 16:9 컨테이너 */
        .dashboard-container {
            width: 100vw;
            height: 56.25vw; /* 16:9 비율 */
            max-height: 100vh;
            max-width: 177.78vh; /* 16:9 비율 */
            background-color: white;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* 헤더 디자인 (롯데 공식홈페이지 느낌) */
        header {
            padding: 2% 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--lotte-red);
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--lotte-red);
            letter-spacing: -1px;
        }

        .current-time {
            font-size: 1.5rem;
            color: #666;
        }

        /* 메인 콘텐츠 리스트 */
        main {
            flex: 1;
            padding: 2% 4%;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            text-align: left;
            padding: 1rem;
            font-size: 1.2rem;
            color: #888;
            border-bottom: 1px solid var(--border-color);
            font-weight: 400;
        }

        tbody tr {
            border-bottom: 1px solid var(--border-color);
            transition: background 0.3s;
        }

        tbody td {
            padding: 2rem 1rem;
            font-size: 1.8rem;
            color: var(--text-dark);
        }

        .course-name { font-weight: 700; width: 40%; }
        .course-date { font-size: 1.3rem; color: #666; width: 25%; }
        .room-number { font-weight: 700; color: var(--lotte-red); width: 20%; text-align: center; }
        .direction { width: 15%; text-align: right; font-size: 2.5rem; }

        /* 화살표 애니메이션 */
        .arrow {
            display: inline-block;
            color: var(--lotte-red);
        }

        /* 푸터 */
        footer {
            padding: 1.5% 4%;
            background: var(--bg-gray);
            font-size: 1rem;
            color: #999;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header>
            <div class="logo">Lotte <span style="color:#222; font-weight:300;">Academy</span></div>
            <div class="current-time" id="clock">2026-06-15 14:39</div>
        </header>

        <main>
            <table>
                <thead>
                    <tr>
                        <th>과정명</th>
                        <th>교육기간</th>
                        <th style="text-align: center;">강의실</th>
                        <th style="text-align: right;">이동방향</th>
                    </tr>
                </thead>
                <tbody id="course-list">
                    <!-- 데이터가 여기에 삽입됩니다 -->
                </tbody>
            </table>
        </main>

        <footer>
            본 화면은 실시간 교육 일정에 따라 자동으로 업데이트됩니다.
        </footer>
    </div>

    <script>
        // 구글 시트 웹 게시(CSV) URL을 여기에 붙여넣으세요
        const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vThSEdRPQ80O2WMC8E-ceES--tvUAIVPlIR4_gmRq2Uoix8CxKqU3WQSkh5O3bKPI4tU56jqMXPKQcn/pub?output=csv';

        // 현재 시간 설정 (요청하신 기준 시간: 2026-06-15 14:39)
        const TODAY = new Date('2026-06-15');

        async function fetchSheetData() {
            try {
                const response = await fetch(GOOGLE_SHEET_CSV_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1); // 헤더 제외

                const listContainer = document.getElementById('course-list');
                listContainer.innerHTML = '';

                rows.forEach(row => {
                    const columns = row.split(',');
                    if(columns.length < 5) return;

                    const [title, start, end, room, direction] = columns.map(item => item.trim());

                    // 날짜 필터링 (현재 날짜가 시작일과 종료일 사이인 경우만 표시)
                    const startDate = new Date(start);
                    const endDate = new Date(end);

                    if (TODAY >= startDate && TODAY <= endDate) {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td class="course-name">${title}</td>
                            <td class="course-date">${start} ~ ${end}</td>
                            <td class="room-number">${room}호</td>
                            <td class="direction"><span class="arrow">${getArrow(direction)}</span></td>
                        `;
                        listContainer.appendChild(tr);
                    }
                });
            } catch (error) {
                console.error('데이터를 불러오는데 실패했습니다.', error);
            }
        }

        // 방향 텍스트를 화살표 아이콘으로 변환
        function getArrow(dir) {
            if (dir.includes('왼쪽')) return '←';
            if (dir.includes('오른쪽')) return '→';
            if (dir.includes('위')) return '↑';
            if (dir.includes('아래')) return '↓';
            if (dir.includes('11시')) return '↖';
            if (dir.includes('1시')) return '↗';
            return '→'; // 기본값
        }

        // 시계 업데이트
        function updateClock() {
            const now = new Date(); // 실제 구동 시에는 현재 시간을 사용
            // 여기서는 요청하신 기준 시간을 출력하도록 고정하거나 조정 가능
            document.getElementById('clock').innerText = `2026-06-15 14:39`;
        }

        // 초기 실행 및 주기적 업데이트 (5분마다)
        fetchSheetData();
        setInterval(fetchSheetData, 300000); 
        updateClock();
    </script>
</body>
</html>
