<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강의실 안내 대시보드</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --lotte-red: #E60012;
            --bg-gray: #F1F1F1;
            --text-dark: #333;
            --border-color: #DDD;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }

        body {
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 16:9 컨테이너 */
        #dashboard {
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            background-color: white;
            display: flex;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* 왼쪽 사이드바 (로고 및 안내) */
        .sidebar {
            width: 25%;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            background-color: white;
        }

        .header {
            padding: 40px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: center;
        }

        /* 로고 사이즈 조절 */
        .logo-img {
            width: 100%;
            max-width: 250px;
            height: auto;
            object-fit: contain;
        }

        .guide-box {
            padding: 40px 30px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .guide-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--lotte-red);
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .guide-text {
            font-size: 1rem;
            color: #666;
            line-height: 1.6;
            word-break: keep-all;
        }

        /* 오른쪽 메인 영역 (그리드 레이아웃) */
        .main-content {
            width: 75%;
            padding: 30px;
            background-color: var(--bg-gray);
            display: grid;
            gap: 25px;
            /* 기본 2열 구성 */
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
        }

        /* 데이터 개수에 따른 그리드 변형 */
        .count-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
        .count-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
        .count-3 .course-card:last-child { grid-column: span 2; } /* 3개일 때 마지막 카드가 하단 전체 차지 */

        /* 교육 과정 카드 스타일 */
        .course-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-top: 8px solid var(--lotte-red);
            transition: transform 0.3s ease;
            animation: fadeIn 0.6s ease-out forwards;
        }

        .card-top .label {
            color: var(--lotte-red);
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 10px;
            display: block;
        }

        .card-top h2 {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--text-dark);
            line-height: 1.2;
            word-break: keep-all;
        }

        .card-info {
            margin-top: 20px;
            display: flex;
            gap: 30px;
        }

        .info-item h4 { font-size: 0.9rem; color: #888; margin-bottom: 5px; }
        .info-item p { font-size: 1.3rem; font-weight: 700; color: #333; }

        .card-bottom {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed #DDD;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .arrow {
            font-size: 5rem;
            color: var(--lotte-red);
            font-weight: bold;
            line-height: 1;
        }

        .room-tag {
            background-color: var(--lotte-red);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.2rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 텍스트가 너무 많을 때 스케일 조정 */
        .count-1 .card-top h2 { font-size: 4rem; }
        .count-1 .arrow { font-size: 10rem; }
    </style>
</head>
<body>

<div id="dashboard">
    <!-- 왼쪽 사이드바 -->
    <aside class="sidebar">
        <div class="header">
            <img src="logo.png" alt="LOTTE" class="logo-img">
        </div>
        <div class="guide-box">
            <div class="guide-title">오늘의 교육 과정</div>
            <div class="guide-text">
                롯데 아카데미를 방문해주셔서 감사합니다.<br>
                우측 영역에서 과정명과 강의실 위치를 확인해 주세요.
            </div>
        </div>
    </aside>

    <!-- 오른쪽 과정 리스트 영역 -->
    <main class="main-content" id="courseContainer">
        <!-- JS로 카드가 생성됩니다 -->
    </main>
</div>

<script>
    // 1. 구글 시트 CSV URL 입력
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vThSEdRPQ80O2WMC8E-ceES--tvUAIVPlIR4_gmRq2Uoix8CxKqU3WQSkh5O3bKPI4tU56jqMXPKQcn/pub?output=csv';

    const arrowMap = { 'left': '←', 'right': '→', 'up': '↑', 'straight': '↑', 'down': '↓' };

    async function fetchSheetData() {
        try {
            const response = await fetch(SHEET_URL);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            
            // 최대 4개까지만 가져오기
            const courses = rows.map(row => {
                const cols = row.split(',');
                return {
                    title: cols[0],
                    period: cols[1],
                    room: cols[2],
                    direction: cols[3]?.trim().toLowerCase()
                };
            }).filter(item => item.title).slice(0, 4);

            renderDashboard(courses);
        } catch (error) {
            console.error('데이터 로드 실패:', error);
            document.getElementById('courseContainer').innerHTML = '데이터를 불러오는 중 오류가 발생했습니다.';
        }
    }

    function renderDashboard(courses) {
        const container = document.getElementById('courseContainer');
        
        // 개수에 따른 클래스 부여 (레이아웃 조절)
        container.className = `main-content count-${courses.length}`;
        
        if (courses.length === 0) {
            container.innerHTML = '<div style="grid-column: span 2; text-align:center; font-size:2rem; color:#999; align-self:center;">진행 중인 교육 과정이 없습니다.</div>';
            return;
        }

        container.innerHTML = courses.map((course, index) => `
            <div class="course-card" style="animation-delay: ${index * 0.1}s">
                <div class="card-top">
                    <span class="label">EDUCATION COURSE</span>
                    <h2>${course.title}</h2>
                    <div class="card-info">
                        <div class="info-item">
                            <h4>교육 기간</h4>
                            <p>${course.period}</p>
                        </div>
                    </div>
                </div>
                <div class="card-bottom">
                    <div class="room-tag">${course.room}</div>
                    <div class="arrow">${arrowMap[course.direction] || '→'}</div>
                </div>
            </div>
        `).join('');
    }

    // 초기 실행 및 1분마다 업데이트
    fetchSheetData();
    setInterval(fetchSheetData, 60000);
</script>

</body>
</html>
