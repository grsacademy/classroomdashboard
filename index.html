<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>롯데지알에스 아카데미 안내</title>
    <!-- Pretendard 폰트 로드 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --lotte-red: #E60012;
            --bg-light: #F8F9FA;
            --text-main: #1A1A1A;
            --text-sub: #666666;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }

        body {
            background-color: #222;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 전체 컨테이너: 16:9 비율 유지 */
        #dashboard {
            width: 100vw;
            height: 56.25vw; /* 16:9 비율 */
            max-height: 100vh;
            max-width: 177.78vh;
            background-color: white;
            display: flex;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            position: relative;
        }

        /* --- 왼쪽 사이드바 --- */
        .sidebar {
            width: 28%;
            background-color: white;
            border-right: 1px solid #EEE;
            display: flex;
            flex-direction: column;
            padding: 50px 40px;
        }

        .logo-area {
            margin-bottom: 40px;
            text-align: left;
        }

        .logo-img {
            height: 30px;
            width: auto;
        }

        /* 시계 영역 */
        .clock-area {
            margin-bottom: 50px;
        }

        #current-date {
            font-size: 1.4rem;
            color: var(--text-sub);
            font-weight: 500;
            margin-bottom: 5px;
        }

        #current-time {
            font-size: 4.5rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -2px;
            line-height: 1;
        }

        /* 안내 문구 영역 */
        .guide-area {
            flex: 1;
        }

        .guide-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--lotte-red);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .guide-title::after {
            content: "";
            flex: 1;
            height: 2px;
            background: #EEE;
        }

        .guide-text {
            font-size: 1.15rem;
            line-height: 1.7;
            color: #444;
            word-break: keep-all;
        }

        /* 공지사항/WIFI (하단 고정) */
        .notice-area {
            background-color: #F9F9F9;
            padding: 25px;
            border-radius: 15px;
            border-left: 5px solid var(--lotte-red);
        }

        .notice-item { margin-bottom: 15px; }
        .notice-item:last-child { margin-bottom: 0; }

        .notice-label {
            font-size: 0.85rem;
            color: var(--lotte-red);
            font-weight: 700;
            margin-bottom: 5px;
            display: block;
        }

        .notice-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            line-height: 1.4;
        }

        /* --- 오른쪽 메인 콘텐츠 --- */
        .main-content {
            width: 72%;
            padding: 50px;
            background-color: var(--bg-light);
            display: grid;
            gap: 30px;
        }

        .count-1 { grid-template-columns: 1fr; }
        .count-2 { grid-template-columns: 1fr 1fr; }
        .count-3, .count-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        .count-3 .course-card:last-child { grid-column: span 2; }

        .course-card {
            background: white;
            border-radius: 25px;
            padding: 50px;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
            animation: fadeInUp 0.6s ease-out forwards;
        }

        /* [수정 부분] 상단 텍스트 정렬 */
        .card-top .title {
            font-size: 3rem;
            font-weight: 800;
            color: var(--text-main);
            line-height: 1.2;
            word-break: keep-all;
            margin-bottom: 12px; /* 제목 아래에 여백 추가 */
        }

        .card-top .period {
            font-size: 1.3rem;
            color: var(--text-sub);
            font-weight: 500;
            display: block;
        }

        .card-bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 20px;
        }

        .room-info {
            background: #F1F1F1;
            padding: 15px 30px;
            border-radius: 15px;
        }

        .room-info span {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--lotte-red);
            display: block;
            margin-bottom: 5px;
        }

        .room-info p {
            font-size: 2.2rem;
            font-weight: 800;
            color: #222;
        }

        .direction-arrow {
            font-size: 7rem;
            font-weight: 900;
            color: var(--lotte-red);
            line-height: 0.7;
        }

        /* 개수별 크기 미세 조정 */
        .count-1 .title { font-size: 5.5rem; }
        .count-1 .period { font-size: 2rem; }
        .count-1 .direction-arrow { font-size: 15rem; }
        .count-1 .room-info p { font-size: 4rem; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="dashboard">
    <aside class="sidebar">
        <div class="logo-area">
            <img src="logo.png" alt="LOTTE GRS" class="logo-img">
        </div>

        <div class="clock-area">
            <div id="current-date">0000. 00. 00 (요일)</div>
            <div id="current-time">00:00</div>
        </div>

        <div class="guide-area">
            <div class="guide-title">강의실 안내</div>
            <p class="guide-text">
                롯데지알에스 아카데미에 오신 것을 환영합니다.<br>
                오늘 진행되는 교육 과정과 강의실 위치를 확인해 주시기 바랍니다.
            </p>
        </div>

         <div class="notice-area">
            <div class="notice-item">
                <span class="notice-label">Wi-Fi</span>
                <p class="notice-value">ID : GRS_Academy_EXT<br>PW : grsacademy1!</p>
            </div>
            <div class="notice-item">
                <span class="notice-label">Information</span>
                <p class="notice-value">대표 번호 : 02-709-6920</p>
            </div>
        </div>
    </aside>

    <main class="main-content" id="courseContainer">
        <!-- JS에서 카드가 생성됩니다 -->
    </main>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vThSEdRPQ80O2WMC8E-ceES--tvUAIVPlIR4_gmRq2Uoix8CxKqU3WQSkh5O3bKPI4tU56jqMXPKQcn/pub?output=csv';
    const arrowMap = { 'left': '←', 'right': '→', 'up': '↑', 'straight': '↑', 'down': '↓' };

    function updateClock() {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        const week = ['일', '월', '화', '수', '목', '금', '토'][now.getDay()];
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');

        document.getElementById('current-date').innerText = `${y}. ${m}. ${d} (${week})`;
        document.getElementById('current-time').innerText = `${hh}:${mm}`;
    }

    async function fetchSheetData() {
        try {
            const response = await fetch(SHEET_URL);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            
            const courses = rows.map(row => {
                const cols = row.split(',');
                return {
                    title: cols[0]?.trim(),
                    period: cols[1]?.trim(),
                    room: cols[2]?.trim(),
                    direction: cols[3]?.trim().toLowerCase()
                };
            }).filter(item => item.title).slice(0, 4);

            renderDashboard(courses);
        } catch (error) {
            console.error('데이터 로드 오류:', error);
            // 테스트용 데이터 (시트 연결 전 확인용)
            // renderDashboard([{title: "관리자 리더십 향상 과정", period: "09:00 ~ 17:00", room: "제 1강의실", direction: "right"}]);
        }
    }

    function renderDashboard(courses) {
        const container = document.getElementById('courseContainer');
        container.className = `main-content count-${courses.length}`;
        
        if (courses.length === 0) {
            container.innerHTML = `<div style="grid-column: span 2; text-align:center; font-size:2rem; color:#999; align-self:center;">현재 진행 중인 교육 과정이 없습니다.</div>`;
            return;
        }

        // [수정 부분] title이 위로, period가 아래로 가도록 순서 변경
        container.innerHTML = courses.map((course, index) => `
            <div class="course-card" style="animation-delay: ${index * 0.1}s">
                <div class="card-top">
                    <h2 class="title">${course.title}</h2>
                    <span class="period">${course.period}</span>
                </div>
                <div class="card-bottom">
                    <div class="room-info">
                        <span>LECTURE ROOM</span>
                        <p>${course.room}</p>
                    </div>
                    <div class="direction-arrow">${arrowMap[course.direction] || '→'}</div>
                </div>
            </div>
        `).join('');
    }

    updateClock();
    setInterval(updateClock, 1000);
    fetchSheetData();
    setInterval(fetchSheetData, 60000);
</script>

</body>
</html>
