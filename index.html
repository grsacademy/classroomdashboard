<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강의실 안내 대시보드</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --lotte-red: #E60012;
            --bg-gray: #F8F8F8;
            --text-dark: #333;
            --border-color: #DDD;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }

        body {
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 16:9 컨테이너 */
        #dashboard {
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            background-color: white;
            display: flex;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* 왼쪽 리스트 섹션 */
        .sidebar {
            width: 35%;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            background-color: white;
        }

        /* 로고 헤더 영역 */
        .header {
            padding: 40px; /* 상하좌우 여백 */
            border-bottom: 4px solid var(--lotte-red);
            display: flex;
            align-items: center;
            justify-content: flex-start; /* 왼쪽 정렬 (가운데는 center) */
        }

        /* ★ 로고 이미지 사이즈 조절 CSS ★ */
        .logo-img {
            width: 250px;        /* 로고 가로 너비 (원하는 크기로 수정하세요) */
            height: auto;        /* 세로 비율 유지 */
            max-height: 80px;    /* 최대 높이 제한 (헤더를 넘어가지 않게) */
            object-fit: contain;
        }

        .course-list {
            flex: 1;
            overflow-y: auto;
        }

        .course-item {
            padding: 25px 40px;
            border-bottom: 1px solid #EEE;
            cursor: pointer;
            transition: all 0.3s;
        }

        .course-item:hover { background-color: #FFF5F5; }
        .course-item.active {
            background-color: var(--lotte-red);
            color: white;
        }

        .course-item h3 { font-size: 1.2rem; margin-bottom: 5px; }
        .course-item p { font-size: 0.9rem; opacity: 0.8; }

        /* 오른쪽 상세 정보 섹션 */
        .main-content {
            width: 65%;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-color: var(--bg-gray);
            position: relative;
        }

        .details-card {
            background: white;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .label {
            color: var(--lotte-red);
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 10px;
            display: block;
        }

        .val-title { font-size: 3rem; font-weight: 800; margin-bottom: 40px; line-height: 1.2; }
        .info-grid { display: flex; gap: 40px; margin-bottom: 40px; }
        .info-box h4 { font-size: 1rem; color: #777; margin-bottom: 10px; }
        .info-box p { font-size: 1.8rem; font-weight: 700; }

        .direction-area {
            text-align: center;
            margin-top: 20px;
            padding-top: 40px;
            border-top: 1px dashed var(--border-color);
        }

        .arrow {
            font-size: 8rem;
            color: var(--lotte-red);
            display: inline-block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate { animation: fadeIn 0.5s ease-out; }

    </style>
</head>
<body>

<div id="dashboard">
    <!-- 왼쪽 목록 -->
    <aside class="sidebar">
        <!-- 로고 영역 -->
        <div class="header">
            <!-- 롯데 로고 이미지를 넣으세요. src에 이미지 경로 입력 -->
            <img src="logo.png" alt="LOTTE Logo" class="logo-img">
        </div>
        <div class="course-list" id="courseList">
            <div style="padding: 40px;">데이터를 불러오는 중...</div>
        </div>
    </aside>

    <!-- 오른쪽 상세 -->
    <main class="main-content" id="mainContent">
        <div class="details-card" id="detailsCard">
            <span class="label">Education Course</span>
            <h2 class="val-title" id="det-title">강의를 선택해주세요</h2>
            
            <div class="info-grid">
                <div class="info-box">
                    <h4>교육기간</h4>
                    <p id="det-period">-</p>
                </div>
                <div class="info-box">
                    <h4>강의실</h4>
                    <p id="det-room">-</p>
                </div>
            </div>

            <div class="direction-area">
                <div class="arrow" id="det-arrow">→</div>
                <p style="font-weight: 700; color: #555; margin-top: 10px;">이동 방향</p>
            </div>
        </div>
    </main>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vThSEdRPQ80O2WMC8E-ceES--tvUAIVPlIR4_gmRq2Uoix8CxKqU3WQSkh5O3bKPI4tU56jqMXPKQcn/pub?output=csv';

    let courses = [];
    const arrowMap = { 'left': '←', 'right': '→', 'up': '↑', 'straight': '↑', 'down': '↓' };

    async function fetchSheetData() {
        try {
            const response = await fetch(SHEET_URL);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            courses = rows.map(row => {
                const cols = row.split(',');
                return {
                    title: cols[0],
                    period: cols[1],
                    room: cols[2],
                    direction: cols[3]?.trim().toLowerCase()
                };
            }).filter(item => item.title);

            renderList();
            if(courses.length > 0) showDetails(0);
        } catch (error) {
            console.error('데이터 로드 실패:', error);
            document.getElementById('courseList').innerHTML = '<div style="padding:40px;">데이터 로드 실패</div>';
        }
    }

    function renderList() {
        const listEl = document.getElementById('courseList');
        listEl.innerHTML = courses.map((course, index) => `
            <div class="course-item" onclick="showDetails(${index})" id="item-${index}">
                <h3>${course.title}</h3>
                <p>${course.room}</p>
            </div>
        `).join('');
    }

    function showDetails(index) {
        const data = courses[index];
        document.querySelectorAll('.course-item').forEach(el => el.classList.remove('active'));
        const activeItem = document.getElementById(`item-${index}`);
        if(activeItem) activeItem.classList.add('active');

        const card = document.getElementById('detailsCard');
        card.classList.remove('animate');
        void card.offsetWidth;
        card.classList.add('animate');

        document.getElementById('det-title').innerText = data.title;
        document.getElementById('det-period').innerText = data.period;
        document.getElementById('det-room').innerText = data.room;
        document.getElementById('det-arrow').innerText = arrowMap[data.direction] || '→';
    }

    fetchSheetData();
    setInterval(fetchSheetData, 60000); 
</script>

</body>
</html>
