<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강의실 안내 대시보드</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --lotte-red: #E60012;
            --bg-gray: #F8F8F8;
            --text-dark: #333;
            --text-gray: #777;
            --border-color: #DDD;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }

        body {
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 16:9 컨테이너 */
        #dashboard {
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            background-color: white;
            display: flex;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* 왼쪽 리스트 섹션 */
        .sidebar {
            width: 35%;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            background-color: white;
        }

        /* 로고 헤더 */
        .header {
            padding: 40px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
        }

        .logo-img {
            width: 250px;
            height: auto;
            object-fit: contain;
        }

        /* ★ 추가: 안내 문구 영역 ★ */
        .guide-box {
            background-color: #f9f9f9;
            padding: 15px 40px;
            border-bottom: 4px solid var(--lotte-red);
        }

        .guide-text {
            font-size: 0.95rem;
            color: var(--lotte-red);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 깜빡이는 애니메이션 효과 */
        .guide-text::before {
            content: '●';
            font-size: 0.7rem;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .course-list {
            flex: 1;
            overflow-y: auto;
        }

        .course-item {
            padding: 25px 40px;
            border-bottom: 1px solid #EEE;
            cursor: pointer;
            transition: all 0.3s;
        }

        .course-item:hover { background-color: #FFF5F5; }
        .course-item.active {
            background-color: var(--lotte-red);
            color: white;
        }

        .course-item h3 { font-size: 1.2rem; margin-bottom: 5px; word-break: keep-all; }
        .course-item p { font-size: 0.9rem; opacity: 0.8; }

        /* 오른쪽 상세 정보 섹션 */
        .main-content {
            width: 65%;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-color: var(--bg-gray);
        }

        .details-card {
            background: white;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            min-height: 500px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .label {
            color: var(--lotte-red);
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 10px;
            display: block;
        }

        .val-title { font-size: 3.2rem; font-weight: 800; margin-bottom: 40px; line-height: 1.2; word-break: keep-all; }
        .info-grid { display: flex; gap: 60px; margin-bottom: 40px; }
        .info-box h4 { font-size: 1.1rem; color: #777; margin-bottom: 10px; }
        .info-box p { font-size: 2rem; font-weight: 700; }

        .direction-area {
            text-align: center;
            margin-top: 20px;
            padding-top: 40px;
            border-top: 1px dashed var(--border-color);
        }

        .arrow {
            font-size: 9rem;
            color: var(--lotte-red);
            line-height: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate { animation: fadeIn 0.5s ease-out; }

    </style>
</head>
<body>

<div id="dashboard">
    <!-- 왼쪽 목록 -->
    <aside class="sidebar">
        <div class="header">
            <img src="logo.png" alt="LOTTE" class="logo-img">
        </div>
        
        <!-- 안내 문구 영역 -->
        <div class="guide-box">
            <div class="guide-text">과정명을 선택하면 정보를 확인할 수 있습니다.</div>
        </div>

        <div class="course-list" id="courseList">
            <div style="padding: 40px; color: #999;">데이터를 불러오는 중...</div>
        </div>
    </aside>

    <!-- 오른쪽 상세 -->
    <main class="main-content" id="mainContent">
        <div class="details-card" id="detailsCard">
            <div id="empty-state">
                <span class="label">Information</span>
                <h2 class="val-title" style="color: #ccc;">강의를 선택해 주세요</h2>
                <p style="color: #999; font-size: 1.2rem;">왼쪽 목록에서 안내받으실 과정명을 클릭하세요.</p>
            </div>

            <div id="detail-content" style="display: none;">
                <span class="label">Education Course</span>
                <h2 class="val-title" id="det-title">-</h2>
                
                <div class="info-grid">
                    <div class="info-box">
                        <h4>교육기간</h4>
                        <p id="det-period">-</p>
                    </div>
                    <div class="info-box">
                        <h4>강의실</h4>
                        <p id="det-room">-</p>
                    </div>
                </div>

                <div class="direction-area">
                    <div class="arrow" id="det-arrow">→</div>
                    <p style="font-weight: 700; color: #555; margin-top: 10px;">이동 방향</p>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    // 구글 시트 CSV URL을 여기에 입력하세요
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vThSEdRPQ80O2WMC8E-ceES--tvUAIVPlIR4_gmRq2Uoix8CxKqU3WQSkh5O3bKPI4tU56jqMXPKQcn/pub?output=csv';

    let courses = [];
    const arrowMap = { 'left': '←', 'right': '→', 'up': '↑', 'straight': '↑', 'down': '↓' };

    async function fetchSheetData() {
        try {
            const response = await fetch(SHEET_URL);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            courses = rows.map(row => {
                const cols = row.split(',');
                return {
                    title: cols[0],
                    period: cols[1],
                    room: cols[2],
                    direction: cols[3]?.trim().toLowerCase()
                };
            }).filter(item => item.title);

            renderList();
            // 첫 로딩 시 안내를 위해 자동 선택은 하지 않거나, 첫 번째를 보여주려면 아래 주석 해제
            // if(courses.length > 0) showDetails(0); 
        } catch (error) {
            console.error('데이터 로드 실패:', error);
            document.getElementById('courseList').innerHTML = '<div style="padding:40px;">데이터를 불러올 수 없습니다.</div>';
        }
    }

    function renderList() {
        const listEl = document.getElementById('courseList');
        listEl.innerHTML = courses.map((course, index) => `
            <div class="course-item" onclick="showDetails(${index})" id="item-${index}">
                <h3>${course.title}</h3>
                <p>${course.room}</p>
            </div>
        `).join('');
    }

    function showDetails(index) {
        const data = courses[index];
        
        // UI 전환: 안내 문구 숨기고 상세 내용 표시
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('detail-content').style.display = 'block';

        // 액티브 상태 변경
        document.querySelectorAll('.course-item').forEach(el => el.classList.remove('active'));
        const activeItem = document.getElementById(`item-${index}`);
        if(activeItem) activeItem.classList.add('active');

        // 애니메이션 효과
        const card = document.getElementById('detailsCard');
        card.classList.remove('animate');
        void card.offsetWidth;
        card.classList.add('animate');

        // 데이터 반영
        document.getElementById('det-title').innerText = data.title;
        document.getElementById('det-period').innerText = data.period;
        document.getElementById('det-room').innerText = data.room;
        document.getElementById('det-arrow').innerText = arrowMap[data.direction] || '→';
    }

    fetchSheetData();
    setInterval(fetchSheetData, 60000); // 1분마다 업데이트
</script>

</body>
</html>
