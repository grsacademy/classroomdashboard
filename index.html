<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강의장 안내 대시보드</title>
    <style>
        /* GRS 스타일 기반 디자인 */
        :root {
            --bg-dark: #0f172a;       /* 매우 어두운 남색 배경 */
            --card-bg: #1e293b;      /* 카드 배경 */
            --point-color: #fbbf24;   /* 포인트 노란색 (GRS 스타일) */
            --text-main: #ffffff;
            --text-sub: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 16:9 비율 유지 컨테이너 */
        .dashboard {
            width: 100vw;
            height: 56.25vw; 
            max-height: 100vh;
            max-width: 177.78vh;
            display: flex;
            flex-direction: column;
            padding: 2% 4%;
        }

        /* 헤더 섹션 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 30px;
            border-bottom: 4px solid var(--point-color);
            padding-bottom: 15px;
        }

        .logo-area { font-size: 3.5rem; font-weight: 900; letter-spacing: -2px; color: var(--point-color); }
        .time-area { text-align: right; font-size: 1.8rem; font-weight: 500; color: #fff; }

        /* 리스트 영역 */
        .content-list {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        /* 개별 항목 (행) */
        .row {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* 왼쪽: 과정명 및 기간 */
        .left-box {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .course-title { font-size: 2.8rem; font-weight: 700; color: #fff; line-height: 1.2; }
        .course-period { font-size: 1.5rem; color: var(--text-sub); }

        /* 오른쪽: 강의실 및 방향 */
        .right-box {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 50px;
        }

        .room-tag {
            font-size: 4rem;
            font-weight: 800;
            color: var(--point-color);
            min-width: 180px;
            text-align: right;
        }

        /* 화살표 스타일 */
        .arrow-icon {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .arrow-icon svg {
            width: 80px;
            height: 80px;
            fill: var(--point-color);
        }

        /* 데이터 없을 때 메시지 */
        .loading { text-align: center; font-size: 2rem; margin-top: 100px; color: var(--text-sub); }

    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <div class="logo-area">GRS ACADEMY <span style="font-size: 1.5rem; color: #fff;">강의장 안내</span></div>
        <div class="time-area" id="clock">2026-06-15 14:33:00</div>
    </header>

    <div class="content-list" id="sheet-data-list">
        <div class="loading">데이터를 실시간으로 불러오는 중...</div>
    </div>
</div>

<script>
    // 1. 본인의 구글 시트 CSV URL을 여기에 입력하세요
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vThSEdRPQ80O2WMC8E-ceES--tvUAIVPlIR4_gmRq2Uoix8CxKqU3WQSkh5O3bKPI4tU56jqMXPKQcn/pub?output=csv%27';

    // 2. 화살표 SVG 코드 (왼쪽/오른쪽 전용)
    const icons = {
        left: `<svg viewBox="0 0 24 24"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z" /></svg>`,
        right: `<svg viewBox="0 0 24 24"><path d="M4,11V13H16L10.5,18.5L11.92,19.92L19.84,12L11.92,4.08L10.5,5.5L16,11H4Z" /></svg>`
    };

    // 3. 시간 업데이트
    function updateClock() {
        const now = new Date();
        const dateStr = now.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' });
        const timeStr = now.toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        document.getElementById('clock').innerText = `${dateStr} ${timeStr}`;
    }

    // 4. 데이터 로드 및 렌더링
    async function loadData() {
        try {
            const response = await fetch(CSV_URL);
            const data = await response.text();
            
            // CSV 파싱 (줄바꿈 처리)
            const rows = data.split(/\r?\n/).slice(1); 
            const listContainer = document.getElementById('sheet-data-list');
            listContainer.innerHTML = '';

            rows.forEach(row => {
                // 쉼표로 구분하되 큰따옴표 안의 쉼표는 무시하는 정규식 (복잡한 과정명 대비)
                const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                
                if (cols && cols.length >= 3) {
                    const title = cols[0].replace(/"/g, "");
                    const period = cols[1].replace(/"/g, "");
                    const room = cols[2].replace(/"/g, "");
                    const directionRaw = cols[3] ? cols[3].replace(/"/g, "").trim() : "";

                    // 방향 판단 (왼쪽/left 면 왼쪽 아이콘, 그 외는 오른쪽)
                    let arrowSvg = "";
                    if (directionRaw.includes("왼쪽") || directionRaw.toLowerCase().includes("left")) {
                        arrowSvg = icons.left;
                    } else if (directionRaw.includes("오른쪽") || directionRaw.toLowerCase().includes("right")) {
                        arrowSvg = icons.right;
                    }

                    const rowHtml = `
                        <div class="row">
                            <div class="left-box">
                                <div class="course-title">${title}</div>
                                <div class="course-period">${period}</div>
                            </div>
                            <div class="right-box">
                                <div class="room-tag">${room}</div>
                                <div class="arrow-icon">${arrowSvg}</div>
                            </div>
                        </div>
                    `;
                    listContainer.innerHTML += rowHtml;
                }
            });
        } catch (e) {
            console.error("데이터 로딩 에러:", e);
        }
    }

    // 실행
    setInterval(updateClock, 1000);
    updateClock();
    
    loadData();
    setInterval(loadData, 30000); // 30초마다 데이터 갱신
</script>

</body>
</html>
